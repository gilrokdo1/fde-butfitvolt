name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-review:
    name: Build · Type · Lint · Review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: TypeScript check (erp)
        working-directory: frontend
        run: pnpm --filter erp exec tsc --noEmit

      - name: Build (erp)
        working-directory: frontend
        run: pnpm --filter erp build

      - name: Lint (erp, 실패해도 통과 — 경고용)
        working-directory: frontend
        run: pnpm --filter erp lint || true

      - name: 백엔드 변경 감지
        id: be_changed
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -qE '^backend/fde/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python (백엔드 변경 시)
        if: steps.be_changed.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/fde/requirements.txt

      - name: 백엔드 의존성 설치
        if: steps.be_changed.outputs.changed == 'true'
        working-directory: backend/fde
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # PR #106에서 `from ..utils.db import safe_db` 같은 잘못된 relative import가
      # 머지 후 EC2에서 systemd crashloop(7500회+)을 일으킨 사고 재발 방지용 게이트.
      # 문법상 valid해서 ruff/pyflakes로는 못 잡고, 실제 import 시점에만 잡힌다.
      - name: 백엔드 import smoke test (라우터/유틸 모듈 로드 차단)
        if: steps.be_changed.outputs.changed == 'true'
        working-directory: backend/fde
        env:
          FDE_DB_HOST: localhost
          FDE_DB_PORT: '5432'
          FDE_DB_NAME: dummy
          FDE_DB_USER: dummy
          FDE_DB_PASSWORD: dummy
          FDE_JWT_SECRET: dummy-for-import-only
          REPLICA_DB_HOST: localhost
          REPLICA_DB_PORT: '5432'
          REPLICA_DB_NAME: dummy
          REPLICA_DB_USER: dummy
          REPLICA_DB_PASSWORD: dummy
          ANTHROPIC_API_KEY: dummy
          ERP_PHONE: dummy
          ERP_PASSWORD: dummy
        run: |
          python -c "import main; print('✅ 백엔드 import OK — main + 모든 라우터 로드 성공')"

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 환경변수 유출 패턴 차단
        run: |
          set -e
          # PR의 추가(+) 라인만 검사 (기존 코드는 건드리지 않음)
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          DIFF=$(git diff "$BASE_SHA" "$HEAD_SHA" -- '*.py' '*.ts' '*.tsx' '*.js' '*.jsx' | grep -E '^\+' | grep -vE '^\+\+\+' || true)
          if [ -z "$DIFF" ]; then
            echo "검사할 코드 변경 없음"
            exit 0
          fi

          # 위험 패턴: os.environ / process.env 통째 반환, 시크릿 이름 응답 포함
          BAD_PATTERNS=(
            'dict\(os\.environ'
            'json\.dumps\(os\.environ'
            'return os\.environ'
            '\*\*os\.environ'
            'dotenv_values\('
            'open\(["'\''][^"'\'']*\.env["'\'']'
            'REPLICA_DB_PASSWORD'
            'FDE_JWT_SECRET'
            'FDE_DB_PASSWORD'
            'EC2_SSH_KEY'
            'process\.env[^.]*\).*res\.(send|json)'
            'JSON\.stringify\(process\.env'
          )

          VIOLATIONS=""
          for p in "${BAD_PATTERNS[@]}"; do
            MATCH=$(echo "$DIFF" | grep -E "$p" || true)
            if [ -n "$MATCH" ]; then
              VIOLATIONS="${VIOLATIONS}\n[금지패턴: $p]\n$MATCH\n"
            fi
          done

          # 시크릿 이름을 응답/로그로 노출하는 패턴 (값 참조 + print/return 조합)
          SECRET_NAMES='(REPLICA_DB_PASSWORD|FDE_JWT_SECRET|FDE_DB_PASSWORD|ANTHROPIC_API_KEY|EC2_SSH_KEY)'
          LEAK=$(echo "$DIFF" | grep -E "(print|return|res\.json|res\.send).*getenv.*${SECRET_NAMES}" || true)
          if [ -n "$LEAK" ]; then
            VIOLATIONS="${VIOLATIONS}\n[시크릿 노출 의심]\n$LEAK\n"
          fi

          if [ -n "$VIOLATIONS" ]; then
            echo "❌ 환경변수/시크릿 유출 가능 코드가 감지됐습니다:"
            printf "%b\n" "$VIOLATIONS"
            echo ""
            echo "응답/로그로 env를 통째 내보내거나 시크릿 이름을 반환하지 마세요."
            echo "(정당한 용도라면 리뷰어에게 설명하고 이 체크 뒤 예외 처리 요청)"
            exit 1
          fi
          echo "✅ env 유출 패턴 없음"

      - name: Claude 리뷰 (크리티컬 발견 시 머지 차단)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          chmod +x .github/scripts/claude-review.sh
          .github/scripts/claude-review.sh

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          chmod +x .github/scripts/notify-slack.sh
          .github/scripts/notify-slack.sh fail \
            "PR 체크 실패 — #${{ github.event.pull_request.number }}" \
            "${{ github.event.pull_request.title }}\n${{ github.event.pull_request.html_url }}\n수정 후 다시 push 해주세요." \
            "${{ github.event.pull_request.user.login }}"
