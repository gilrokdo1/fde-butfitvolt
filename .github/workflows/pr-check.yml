name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-review:
    name: Build · Type · Lint · Review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: TypeScript check (erp)
        working-directory: frontend
        run: pnpm --filter erp exec tsc --noEmit

      - name: Build (erp)
        working-directory: frontend
        run: pnpm --filter erp build

      - name: Lint (erp, 실패해도 통과 — 경고용)
        working-directory: frontend
        run: pnpm --filter erp lint || true

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Claude 리뷰 (크리티컬 발견 시 머지 차단)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          chmod +x .github/scripts/claude-review.sh
          .github/scripts/claude-review.sh

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          chmod +x .github/scripts/notify-slack.sh
          .github/scripts/notify-slack.sh fail \
            "PR 체크 실패 — #${{ github.event.pull_request.number }}" \
            "${{ github.event.pull_request.title }}\n${{ github.event.pull_request.html_url }}\n수정 후 다시 push 해주세요." \
            "${{ github.event.pull_request.user.login }}"
