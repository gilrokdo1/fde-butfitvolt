name: Daily Score Slack Notify (manual)

# FDE 멤버 일일 점수 랭킹 + 총평을 슬랙에 공지.
# 정기 발송은 EC2 크론(KST 09:00)이 직접 수행한다 — 이 워크플로우는 수동 디버그/재발송 전용.
# 사용: gh workflow run daily-score-notify.yml [-f dry_run=true]

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'true 면 슬랙 전송 생략 (메시지만 출력)'
        required: false
        default: 'false'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: SSH 키 준비
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: EC2에서 슬랙 메시지 생성/발송
        env:
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          # EC2 .env 의 SLACK_WEBHOOK_URL 을 (dry_run=true 일 때만) 일시적으로 비워서 stdout 출력으로 강제
          if [ "$DRY_RUN" = "true" ]; then
            ssh -i ~/.ssh/id_rsa ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
              'cd ~/fde1/fde-backend && SLACK_WEBHOOK_URL= /usr/bin/python3.11 -m jobs.daily_score_slack'
          else
            ssh -i ~/.ssh/id_rsa ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
              'cd ~/fde1/fde-backend && /usr/bin/python3.11 -m jobs.daily_score_slack'
          fi
