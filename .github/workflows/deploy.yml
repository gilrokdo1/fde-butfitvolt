name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/fde/**'
      - 'deploy.sh'
      - '.github/workflows/deploy.yml'

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & SSH deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 디바운스 (60초)
        run: sleep 60

      - name: 변경 경로 감지
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD^ HEAD || git show --name-only --format= HEAD)
          echo "$CHANGED"
          DEPLOY_ERP=false
          DEPLOY_BE=false
          echo "$CHANGED" | grep -qE '^frontend/' && DEPLOY_ERP=true
          echo "$CHANGED" | grep -qE '^backend/fde/' && DEPLOY_BE=true
          echo "$CHANGED" | grep -qE '^deploy\.sh$' && { DEPLOY_ERP=true; DEPLOY_BE=true; }
          echo "erp=$DEPLOY_ERP" >> "$GITHUB_OUTPUT"
          echo "backend=$DEPLOY_BE" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        if: steps.changes.outputs.erp == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        if: steps.changes.outputs.erp == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: PEM 키 준비
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > BUTFITSEOUL_FDE1.pem
          chmod 600 BUTFITSEOUL_FDE1.pem

      - name: known_hosts 등록
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: deploy.sh를 Ubuntu 호환으로 패치
        run: |
          # deploy.sh의 macOS 전용 PATH 라인을 임시 덮어쓰기
          sed -i 's|export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"|export PATH="$PATH"|' deploy.sh

      - name: 프론트엔드 배포 (erp)
        if: steps.changes.outputs.erp == 'true'
        id: deploy_erp
        run: ./deploy.sh erp

      - name: 백엔드 배포 (fde-backend)
        if: steps.changes.outputs.backend == 'true'
        id: deploy_be
        run: ./deploy.sh fde-backend

      - name: PEM 키 정리
        if: always()
        run: rm -f BUTFITSEOUL_FDE1.pem

      - name: Slack 성공 알림
        if: success() && (steps.changes.outputs.erp == 'true' || steps.changes.outputs.backend == 'true')
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          chmod +x .github/scripts/notify-slack.sh
          TARGETS=""
          [ "${{ steps.changes.outputs.erp }}" = "true" ] && TARGETS="$TARGETS 프론트"
          [ "${{ steps.changes.outputs.backend }}" = "true" ] && TARGETS="$TARGETS 백엔드"
          .github/scripts/notify-slack.sh success \
            "배포 성공 —${TARGETS}" \
            "커밋: ${{ github.event.head_commit.message }}\nhttps://fde.butfitvolt.click" \
            "${{ github.event.head_commit.author.username }}"

      - name: Slack 실패 알림
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          chmod +x .github/scripts/notify-slack.sh
          .github/scripts/notify-slack.sh fail \
            "배포 실패 — main @ ${{ github.sha }}" \
            "커밋: ${{ github.event.head_commit.message }}\n워크플로우 로그: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "${{ github.event.head_commit.author.username }}"

      - name: 실패 시 GitHub Issue 자동 생성 (사후 분석용)
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.username }}
          COMMIT_EMAIL: ${{ github.event.head_commit.author.email }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
          DEPLOY_ERP: ${{ steps.changes.outputs.erp }}
          DEPLOY_BE: ${{ steps.changes.outputs.backend }}
        run: |
          SHORT_SHA="${SHA:0:7}"
          BODY=$(cat <<EOF
          ## 배포 실패 리포트

          - **커밋**: [\`$SHORT_SHA\`](${{ github.server_url }}/${{ github.repository }}/commit/$SHA) — $COMMIT_MSG
          - **작성자**: $COMMIT_AUTHOR ($COMMIT_EMAIL)
          - **워크플로우 로그**: $RUN_URL
          - **배포 대상**: erp=$DEPLOY_ERP / backend=$DEPLOY_BE
          - **발생 시각**: $(date -u +'%Y-%m-%dT%H:%M:%SZ')

          ## 실패 스텝 요약
          아래 워크플로우 로그 링크에서 어떤 스텝이 실패했는지 확인하세요.
          $RUN_URL

          ## 대응 체크리스트
          - [ ] 로그 원인 파악
          - [ ] 재현 방법 기록
          - [ ] 근본 원인 (코드 / 인프라 / 외부 의존)
          - [ ] 재발 방지 액션 (워크플로우 개선, 테스트 추가, 가드레일 등)
          - [ ] 후속 PR/커밋 링크

          ---
          *이 이슈는 \`deploy.yml\`이 자동 생성했습니다. 해결 완료 후 close.*
          EOF
          )
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "🚨 배포 실패 — $SHORT_SHA ($COMMIT_AUTHOR)" \
            --label "deploy-failure,incident" \
            --body "$BODY" || echo "이슈 생성 실패 (label 미존재 가능 — 무시)"
