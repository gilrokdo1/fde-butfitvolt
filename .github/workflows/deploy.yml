name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/fde/**'
      - 'deploy.sh'
      - '.github/workflows/deploy.yml'

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & SSH deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 디바운스 (60초)
        run: sleep 60

      - name: 변경 경로 감지
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD^ HEAD || git show --name-only --format= HEAD)
          echo "$CHANGED"
          DEPLOY_ERP=false
          DEPLOY_BE=false
          echo "$CHANGED" | grep -qE '^frontend/' && DEPLOY_ERP=true
          echo "$CHANGED" | grep -qE '^backend/fde/' && DEPLOY_BE=true
          echo "$CHANGED" | grep -qE '^deploy\.sh$' && { DEPLOY_ERP=true; DEPLOY_BE=true; }
          echo "erp=$DEPLOY_ERP" >> "$GITHUB_OUTPUT"
          echo "backend=$DEPLOY_BE" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        if: steps.changes.outputs.erp == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        if: steps.changes.outputs.erp == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: PEM 키 준비
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > BUTFITSEOUL_FDE1.pem
          chmod 600 BUTFITSEOUL_FDE1.pem

      - name: known_hosts 등록
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: deploy.sh를 Ubuntu 호환으로 패치
        run: |
          # deploy.sh의 macOS 전용 PATH 라인을 임시 덮어쓰기
          sed -i 's|export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"|export PATH="$PATH"|' deploy.sh

      - name: 프론트엔드 의존성 설치 (pnpm install)
        if: steps.changes.outputs.erp == 'true'
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: 프론트엔드 배포 (erp)
        if: steps.changes.outputs.erp == 'true'
        id: deploy_erp
        run: ./deploy.sh erp

      - name: 백엔드 배포 (fde-backend)
        if: steps.changes.outputs.backend == 'true'
        id: deploy_be
        env:
          ERP_PHONE: ${{ secrets.ERP_PHONE }}
          ERP_PASSWORD: ${{ secrets.ERP_PASSWORD }}
        run: ./deploy.sh fde-backend

      - name: 백엔드 API 테스트 (jihee revenue)
        if: steps.changes.outputs.backend == 'true'
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            https://fde.butfitvolt.click/fde-api/jihee/revenue/filter \
            -H "Content-Type: application/json" \
            -d '{"결제일_시작":"2026-04-01","결제일_종료":"2026-04-30","지점명":[],"카테고리":[],"환불_포함":true,"search":"","sort_by":null,"sort_order":"desc"}')
          if [ "$STATUS" = "200" ]; then
            echo "✅ API 테스트 성공 (HTTP $STATUS)"
          else
            echo "❌ API 테스트 실패 (HTTP $STATUS)"
            exit 1
          fi

      - name: PEM 키 정리
        if: always()
        run: rm -f BUTFITSEOUL_FDE1.pem

      # 커밋 메시지는 env 로 전달해야 안전.
      # 직접 ${{ github.event.head_commit.message }} 를 쉘에 치환하면
      # 메시지에 포함된 백틱/$()/() 가 쉘로 해석되어 구문 오류 발생.
      - name: Slack 성공 알림
        if: success() && (steps.changes.outputs.erp == 'true' || steps.changes.outputs.backend == 'true')
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.username }}
          ERP_CHANGED: ${{ steps.changes.outputs.erp }}
          BACKEND_CHANGED: ${{ steps.changes.outputs.backend }}
        run: |
          chmod +x .github/scripts/notify-slack.sh
          TARGETS=""
          [ "$ERP_CHANGED" = "true" ] && TARGETS="$TARGETS 프론트"
          [ "$BACKEND_CHANGED" = "true" ] && TARGETS="$TARGETS 백엔드"
          TITLE=$(printf '%s' "$COMMIT_MSG" | head -n1)
          .github/scripts/notify-slack.sh success \
            "배포 성공 —${TARGETS}" \
            "${TITLE}" \
            "${COMMIT_AUTHOR}"

      - name: Slack 실패 알림
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.username }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          chmod +x .github/scripts/notify-slack.sh
          TITLE=$(printf '%s' "$COMMIT_MSG" | head -n1)
          .github/scripts/notify-slack.sh fail \
            "배포 실패 —${TARGETS:-}" \
            "${TITLE}\n로그: ${RUN_URL}" \
            "${COMMIT_AUTHOR}"
